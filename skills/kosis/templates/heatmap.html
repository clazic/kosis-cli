<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f5f1e8; --panel: #fffdf8; --text: #1e2a2f;
      --muted: #6a747a; --grid: #d8d1c3; --accent: #8f7a52;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #fff6dd 0, transparent 28%),
                  linear-gradient(180deg, #f7f2e7 0%, #efe8da 100%);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 40px; }
    h1 { font-size: 28px; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 8px; text-align: center; }
    .subtitle { color: var(--muted); line-height: 1.6; text-align: center; margin-bottom: 20px; }
    .panel {
      padding: 18px; border: 1px solid #e4dac7; border-radius: 16px;
      background: var(--panel); box-shadow: 0 8px 24px rgba(81, 65, 27, 0.06);
      margin-bottom: 20px;
    }
    .chart { width: 100%; height: 480px; }
    .source { font-size: 13px; color: var(--muted); margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 11px 10px; border-bottom: 1px solid #eee6d7;
      text-align: right; font-variant-numeric: tabular-nums; font-size: 14px;
    }
    th:first-child, td:first-child { text-align: left; }
    thead th { color: var(--text); background: #faf5eb; font-weight: 600; }
    tbody tr:hover { background: #faf5eb; }
    @media (max-width: 720px) {
      h1 { font-size: 22px; }
      .chart { height: 380px; }
      th, td { padding: 9px 7px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>

    <div class="panel">
      <div id="chart" class="chart"></div>
    </div>

    <div class="panel" style="overflow-x:auto;">
      <table id="dataTable" style="width:100%;border-collapse:collapse;">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <p class="source">{{SOURCE}}</p>
  </div>
  <script>
    const DATA = {{DATA}};
    const labels = DATA.labels;

    // Auto-detect format and convert to heatmap [[row, col, val], ...]
    let categories, seriesData;
    if (DATA.categories && DATA.categories.length > 0 &&
        DATA.series.length === 1 && Array.isArray(DATA.series[0].values[0])) {
      // Already in heatmap format: categories + series[0].values = [[row,col,val],...]
      categories = DATA.categories;
      seriesData = DATA.series[0].values;
    } else {
      // Convert from standard series format: each series = one row (category)
      categories = DATA.categories && DATA.categories.length > 0
        ? DATA.categories
        : DATA.series.map(s => s.name);
      seriesData = [];
      DATA.series.forEach((s, row) => {
        s.values.forEach((val, col) => {
          seriesData.push([row, col, val]);
        });
      });
    }
    const unit = DATA.unit || "";

    // Build value lookup: valMap[rowIdx][colIdx] = value
    const valMap = {};
    let minVal = Infinity, maxVal = -Infinity;
    seriesData.forEach(d => {
      const [row, col, val] = d;
      if (!valMap[row]) valMap[row] = {};
      valMap[row][col] = val;
      if (val != null) {
        if (val < minVal) minVal = val;
        if (val > maxVal) maxVal = val;
      }
    });

    const chart = echarts.init(document.getElementById("chart"));
    chart.setOption({
      tooltip: {
        position: "top",
        formatter: function (p) {
          const [row, col, val] = p.data;
          return `${categories[row]} · ${labels[col]}<br><b>${val != null ? val.toLocaleString() : '-'}${unit ? ' ' + unit : ''}</b>`;
        }
      },
      grid: { left: 100, right: 40, top: 20, bottom: 60 },
      xAxis: {
        type: "category",
        data: labels,
        splitArea: { show: true, areaStyle: { color: ["rgba(250,245,235,0.3)", "rgba(255,253,248,0.3)"] } },
        axisLabel: { fontSize: 12, color: "#6a747a" },
        axisLine: { lineStyle: { color: "#d8d1c3" } }
      },
      yAxis: {
        type: "category",
        data: categories,
        splitArea: { show: true, areaStyle: { color: ["rgba(250,245,235,0.3)", "rgba(255,253,248,0.3)"] } },
        axisLabel: { fontSize: 12, color: "#6a747a" },
        axisLine: { lineStyle: { color: "#d8d1c3" } }
      },
      visualMap: {
        min: minVal,
        max: maxVal,
        calculable: true,
        orient: "horizontal",
        left: "center",
        bottom: 0,
        inRange: { color: ["#f5f1e8", "#e8c98a", "#d4a04a", "#d95f02"] },
        textStyle: { color: "#6a747a", fontSize: 12 },
        formatter: function (val) { return val.toLocaleString(); }
      },
      series: [{
        name: DATA.series[0].name || "",
        type: "heatmap",
        data: seriesData,
        label: {
          show: true,
          fontSize: 11,
          formatter: function (p) {
            const val = p.data[2];
            return val != null ? val.toLocaleString() : '-';
          }
        },
        emphasis: {
          itemStyle: { shadowBlur: 10, shadowColor: "rgba(0,0,0,0.15)" }
        },
        itemStyle: { borderColor: "#fffdf8", borderWidth: 1 }
      }]
    });
    window.addEventListener("resize", () => chart.resize());

    // --- Table ---
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    let headerHtml = "<tr><th>구분</th>";
    labels.forEach(l => { headerHtml += `<th>${l}</th>`; });
    headerHtml += "</tr>";
    thead.innerHTML = headerHtml;

    categories.forEach((cat, ri) => {
      let rowHtml = `<tr><td>${cat}</td>`;
      labels.forEach((_, ci) => {
        const v = valMap[ri] && valMap[ri][ci];
        rowHtml += `<td>${v != null ? v.toLocaleString() : '-'}${v != null && unit ? ' ' + unit : ''}</td>`;
      });
      rowHtml += "</tr>";
      tbody.innerHTML += rowHtml;
    });
  </script>
</body>
</html>
