<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f5f1e8; --panel: #fffdf8; --text: #1e2a2f;
      --muted: #6a747a; --grid: #d8d1c3; --accent: #8f7a52;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #fff6dd 0, transparent 28%),
                  linear-gradient(180deg, #f7f2e7 0%, #efe8da 100%);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 40px; }
    h1 { font-size: 28px; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 8px; text-align: center; }
    .subtitle { color: var(--muted); line-height: 1.6; text-align: center; margin-bottom: 16px; }
    .note {
      padding: 12px 16px; border: 1px solid #e4dac7; border-radius: 12px;
      background: rgba(255, 253, 248, 0.85); color: var(--muted);
      font-size: 14px; line-height: 1.6; margin-bottom: 20px;
    }
    .panel {
      padding: 18px; border: 1px solid #e4dac7; border-radius: 16px;
      background: var(--panel); box-shadow: 0 8px 24px rgba(81, 65, 27, 0.06);
      margin-bottom: 20px;
    }
    .chart { width: 100%; height: 440px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 11px 10px; border-bottom: 1px solid #eee6d7;
      text-align: right; font-variant-numeric: tabular-nums; font-size: 14px;
    }
    th:first-child, td:first-child { text-align: center; }
    thead th { color: var(--text); background: #faf5eb; font-weight: 600; }
    tbody tr:hover { background: #faf5eb; }
    .source { font-size: 13px; color: var(--muted); margin-top: 16px; }
    @media (max-width: 720px) {
      h1 { font-size: 22px; }
      .chart { height: 340px; }
      th, td { padding: 9px 7px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <!-- {{NOTE_START}}
    <div class="note">{{NOTE}}</div>
    {{NOTE_END}} -->
    <div class="panel">
      <div id="chart" class="chart"></div>
    </div>
    <div class="panel table-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <p class="source">{{SOURCE}}</p>
  </div>
  <script>
    const DATA = {{DATA}};
    const chart = echarts.init(document.getElementById("chart"));
    const series = [];
    const legendNames = [];

    DATA.series.forEach((s, i) => {
      legendNames.push(s.name);
      series.push({
        name: s.name,
        type: "line",
        smooth: true,
        symbolSize: 6,
        lineStyle: { width: 3 },
        data: s.values
      });
    });

    chart.setOption({
      color: ["#1f77b4","#d95f02","#7570b3","#e7298a","#66a61e","#e6ab02","#a6761d","#666666","#377eb8","#4daf4a","#984ea3","#ff7f00","#a65628","#f781bf","#999999","#17becf","#bcbd22","#e41a1c","#8dd3c7","#fb8072","#80b1d3","#fdb462","#b3de69","#fccde5","#d9d9d9","#bc80bd","#ccebc5","#ffed6f","#1b9e77","#d95f02","#7570b3","#e7298a","#66a61e","#e6ab02","#a6761d","#2ca02c","#d62728","#9467bd","#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf","#aec7e8","#ffbb78","#98df8a","#ff9896","#c5b0d5","#c49c94","#f7b6d2"],
      tooltip: {
        trigger: "axis",
        valueFormatter: v => v != null ? v.toLocaleString() + (DATA.unit ? " " + DATA.unit : "") : "-"
      },
      legend: { top: 8, data: legendNames },
      grid: { left: 70, right: 30, top: 60, bottom: 50 },
      xAxis: {
        type: "category",
        data: DATA.labels,
        boundaryGap: false,
        axisLine: { lineStyle: { color: "#8f7a52" } }
      },
      yAxis: {
        type: "value",
        name: DATA.unit || "",
        splitLine: { lineStyle: { color: "#d8d1c3" } },
        axisLabel: { formatter: v => v.toLocaleString() }
      },
      series: series
    });
    window.addEventListener("resize", () => chart.resize());

    // --- Table ---
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    let hdr = "<tr><th>시점</th>";
    DATA.series.forEach(s => { hdr += `<th>${s.name}</th>`; });
    hdr += "</tr>";
    thead.innerHTML = hdr;
    DATA.labels.forEach((label, i) => {
      let row = `<tr><td>${label}</td>`;
      DATA.series.forEach(s => {
        const v = s.values[i];
        row += `<td>${v != null ? v.toLocaleString() : "-"}</td>`;
      });
      row += "</tr>";
      tbody.innerHTML += row;
    });
  </script>
</body>
</html>
