<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f5f1e8; --panel: #fffdf8; --text: #1e2a2f;
      --muted: #6a747a; --grid: #d8d1c3; --accent: #8f7a52;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #fff6dd 0, transparent 28%),
                  linear-gradient(180deg, #f7f2e7 0%, #efe8da 100%);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 40px; }
    h1 { font-size: 28px; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 8px; text-align: center; }
    .subtitle { color: var(--muted); line-height: 1.6; text-align: center; margin-bottom: 16px; }
    .note {
      padding: 12px 16px; border: 1px solid #e4dac7; border-radius: 12px;
      background: rgba(255, 253, 248, 0.85); color: var(--muted);
      font-size: 14px; line-height: 1.6; margin-bottom: 20px;
    }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      padding: 18px; border: 1px solid #e4dac7; border-radius: 16px;
      background: var(--panel); box-shadow: 0 8px 24px rgba(81, 65, 27, 0.06);
      margin-bottom: 0;
    }
    .panel-full {
      padding: 18px; border: 1px solid #e4dac7; border-radius: 16px;
      background: var(--panel); box-shadow: 0 8px 24px rgba(81, 65, 27, 0.06);
      margin-bottom: 20px;
    }
    .panel-title {
      font-size: 16px; font-weight: 600; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid #eee6d7;
    }
    .chart { width: 100%; height: 340px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 11px 10px; border-bottom: 1px solid #eee6d7;
      text-align: right; font-variant-numeric: tabular-nums; font-size: 14px;
    }
    th:first-child, td:first-child { text-align: center; }
    thead th { color: var(--text); background: #faf5eb; font-weight: 600; }
    tbody tr:hover { background: #faf5eb; }
    .source { font-size: 13px; color: var(--muted); margin-top: 16px; }
    @media (max-width: 720px) {
      h1 { font-size: 22px; }
      .grid { grid-template-columns: 1fr; }
      .chart { height: 280px; }
      th, td { padding: 9px 7px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <!-- {{NOTE_START}}
    <div class="note">{{NOTE}}</div>
    {{NOTE_END}} -->

    <div class="grid" id="chartGrid"></div>

    <div class="panel-full table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <p class="source">{{SOURCE}}</p>
  </div>
  <script>
    const DATA = {{DATA}};
    const COLORS = ["#1f77b4","#d95f02","#7570b3","#e7298a","#66a61e","#e6ab02","#a6761d","#666666","#377eb8","#4daf4a","#984ea3","#ff7f00","#a65628","#f781bf","#999999","#17becf","#bcbd22","#e41a1c","#8dd3c7","#fb8072","#80b1d3","#fdb462","#b3de69","#fccde5","#d9d9d9","#bc80bd","#ccebc5","#ffed6f","#1b9e77","#d95f02","#7570b3","#e7298a","#66a61e","#e6ab02","#a6761d","#2ca02c","#d62728","#9467bd","#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf","#aec7e8","#ffbb78","#98df8a","#ff9896","#c5b0d5","#c49c94","#f7b6d2"];
    const charts = [];

    // --- Charts Grid ---
    const grid = document.getElementById("chartGrid");

    DATA.charts.forEach((c, ci) => {
      const panel = document.createElement("div");
      panel.className = "panel";
      panel.innerHTML = `<div class="panel-title">${c.title || ""}</div><div id="chart-${ci}" class="chart"></div>`;
      grid.appendChild(panel);

      const chartDom = panel.querySelector(`#chart-${ci}`);
      const ec = echarts.init(chartDom);

      const series = (c.series || []).map((s, si) => {
        const base = {
          name: s.name,
          type: c.type || "line",
          data: s.values
        };
        if (c.type === "line" || !c.type) {
          base.smooth = true;
          base.symbolSize = 6;
          base.lineStyle = { width: 3 };
        }
        if (c.type === "bar") {
          base.barMaxWidth = 40;
        }
        return base;
      });

      const unit = c.unit || DATA.unit || "";

      ec.setOption({
        color: COLORS,
        tooltip: {
          trigger: "axis",
          valueFormatter: v => v != null ? v.toLocaleString() + (unit ? " " + unit : "") : "-"
        },
        legend: { top: 8 },
        grid: { left: 60, right: 20, top: 50, bottom: 40 },
        xAxis: {
          type: "category", data: c.labels || DATA.labels,
          boundaryGap: c.type === "bar",
          axisLine: { lineStyle: { color: "#8f7a52" } }
        },
        yAxis: {
          type: "value", name: unit,
          splitLine: { lineStyle: { color: "#d8d1c3" } },
          axisLabel: { formatter: v => v.toLocaleString() }
        },
        series: series
      });

      charts.push(ec);
    });

    window.addEventListener("resize", () => charts.forEach(c => c.resize()));

    // --- Combined Table ---
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");

    // Collect all series names across charts
    const allLabels = DATA.labels || (DATA.charts[0] && DATA.charts[0].labels) || [];
    const columns = [];
    DATA.charts.forEach(c => {
      (c.series || []).forEach(s => {
        const colName = (DATA.charts.length > 1 && c.title) ? `${c.title} - ${s.name}` : s.name;
        columns.push({ name: colName, values: s.values, labels: c.labels || allLabels });
      });
    });

    // Use the longest label set
    const masterLabels = allLabels.length > 0 ? allLabels : (columns.length > 0 ? columns[0].labels : []);

    let headerHTML = "<tr><th>시점</th>";
    columns.forEach(col => { headerHTML += `<th>${col.name}</th>`; });
    headerHTML += "</tr>";
    thead.innerHTML = headerHTML;

    masterLabels.forEach((label, i) => {
      let rowHTML = `<tr><td>${label}</td>`;
      columns.forEach(col => {
        const idx = col.labels.indexOf(label);
        const v = idx >= 0 ? col.values[idx] : null;
        rowHTML += `<td>${v != null ? v.toLocaleString() : "-"}</td>`;
      });
      rowHTML += "</tr>";
      tbody.innerHTML += rowHTML;
    });
  </script>
</body>
</html>
